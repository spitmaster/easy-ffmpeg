<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background, emerald→blue gradient matching the progress bar -->
  <rect x="10" y="10" width="236" height="236" rx="52" fill="url(#bg)"/>
  <!-- White play triangle, slightly shifted right for optical balance -->
  <path d="M 92 72 L 184 128 L 92 184 Z"
        fill="#ffffff"
        stroke="#ffffff"
        stroke-width="14"
        stroke-linejoin="round"/>
</svg>
